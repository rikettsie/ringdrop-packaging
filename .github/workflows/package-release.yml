name: Package release

on:
  # Triggered by the ringdrop repo on release publish (see ringdrop/.github/workflows/release.yml).
  repository_dispatch:
    types: [ringdrop-release]
  # Manual trigger for testing or re-running a specific version.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without v prefix (e.g. 0.13.0)'
        required: true
      release:
        description: 'RPM release number (default: 1)'
        required: false
        default: '1'

jobs:
  rpm:
    name: RPM
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.event.client_payload.version || inputs.version }}
      RELEASE: ${{ github.event.client_payload.release || inputs.release || '1' }}

    steps:
      - name: Checkout ringdrop-packaging
        uses: actions/checkout@v4

      - name: Checkout ringdrop at v${{ env.VERSION }}
        uses: actions/checkout@v4
        with:
          repository: rikettsie/ringdrop
          ref: v${{ env.VERSION }}
          path: ringdrop

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate RPM vendor tarball
        run: |
          cd ringdrop
          bash ../rpm/vendor.sh
          mv ringdrop-${{ env.VERSION }}-vendor.tar.gz ../

      - name: Bump RPM spec
        run: make rpm-bump VERSION=${{ env.VERSION }} RELEASE=${{ env.RELEASE }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore(rpm): bump to ${{ env.VERSION }}"
          git push

      - name: Upload vendor tarball
        uses: actions/upload-artifact@v4
        with:
          name: rpm-vendor-tarball
          path: ringdrop-${{ env.VERSION }}-vendor.tar.gz
          retention-days: 1

      - name: Clean
        run: rm -f *.tar.gz

  copr:
    name: COPR
    runs-on: ubuntu-latest
    needs: rpm
    permissions:
      contents: read
    env:
      VERSION: ${{ github.event.client_payload.version || inputs.version }}

    steps:
      - name: Checkout ringdrop-packaging
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download vendor tarball
        uses: actions/download-artifact@v4
        with:
          name: rpm-vendor-tarball

      - name: Install build tools
        run: sudo apt-get install -y rpm python3-pip

      - name: Install copr-cli
        run: pip3 install copr-cli

      - name: Configure copr-cli
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
          COPR_API_TOKEN: ${{ secrets.COPR_API_TOKEN }}
        run: |
          mkdir -p ~/.config
          cat > ~/.config/copr <<EOF
          [copr-cli]
          login = ${COPR_LOGIN}
          username = ${COPR_USERNAME}
          token = ${COPR_API_TOKEN}
          copr_url = https://copr.fedorainfracloud.org
          EOF

      - name: Download source tarball
        run: |
          curl -fsSL \
            "https://github.com/rikettsie/ringdrop/archive/v${VERSION}/ringdrop-${VERSION}.tar.gz" \
            -o "ringdrop-${VERSION}.tar.gz"

      - name: Build SRPM
        run: |
          rpmbuild \
            --define "_sourcedir $PWD" \
            --define "_srcrpmdir $PWD" \
            -bs rpm/ringdrop.spec

      - name: Submit to COPR
        env:
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
        run: copr-cli build --nowait "${COPR_USERNAME}/ringdrop" ringdrop-*.src.rpm
